name: elux-shopify-sync

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDS_JSON_CONTENT }}' > google_creds.json

      - name: Run sync
        env:
          SHOPIFY_SHOP_URL:    ${{ secrets.SHOPIFY_SHOP_URL }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          GOOGLE_SHEETS_ID:    ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDS_JSON:   google_creds.json
        run: python elux_scraper.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_number }}
          path: |
            elux_sync.log
            elux_products_raw.json
          retention-days: 30

      - name: Cleanup credentials
        if: always()
        run: rm -f google_creds.json
